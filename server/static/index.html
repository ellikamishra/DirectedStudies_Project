<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Parallel-SHAP Bench</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; }
    label { display:block; margin-top:8px; }
    input, select { padding:6px; }
    .row { display:flex; gap:20px; align-items:flex-end; flex-wrap: wrap; }
    table { border-collapse: collapse; width:100%; margin-top:16px; font-size: 15px;}
    th, td { padding:8px; border-bottom:1px solid #eee; text-align:left; }
    th { background:#f6f6f6; }
    #chart-wrapper { margin-top: 20px; }
    #chart-wrapper canvas { max-width: 100%; }
    .text-muted { color:#777; font-style:italic; }
  </style>
</head>
<body>
  <h1>Parallel-SHAP Benchmark</h1>

  <form id="bench" hx-post="/benchmark" hx-trigger="submit" hx-target="#msg" hx-swap="innerHTML">
    <div class="row">
      <label>Label <input name="label" required placeholder="baseline-64P"/></label>
      <label>Backend
        <select name="backend">
          <option value="python">python</option>
          <option value="openmp">openmp</option>
          <option value="cuda">cuda</option>
        </select>
      </label>
      <label>P (permutations) <input type="number" name="P_raw" value="64"/></label>
      <label>Threads (OpenMP) <input type="number" name="threads_raw" placeholder="e.g., 16"/></label>
      <label>N samples <input type="number" name="N_raw" value="50" placeholder="blank = all rows"/></label>
      <label>Dataset <input name="dataset_name" value="market_features.csv"/></label>
      <button type="submit">Run</button>
    </div>
  </form>
  <div id="msg" style="margin-top:8px;color:#0a0">Submit a run above to queue it.</div>

  <h2>Recent Runs (auto-refresh) <span id="filter-count" class="text-muted" style="font-size:14px; font-weight:normal;"></span></h2>
  <div id="chart-wrapper">
    <canvas id="runtimeChart" height="160"></canvas>
  </div>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Label</th>
        <th>Backend</th>
        <th>Runtime (s)</th>
        <th>Speedup vs Py</th>
        <th>Fidelity</th>
        <th>Params</th>
        <th>Notes</th>
      </tr>
    </thead>
    <tbody id="runs-body">
      <tr><td colspan="8" class="text-muted">No runs yet.</td></tr>
    </tbody>
  </table>

  <script>
    const runsBody = document.getElementById("runs-body");
    const chartCtx = document.getElementById("runtimeChart").getContext("2d");
    const filterCount = document.getElementById("filter-count");

    // Show one CUDA, one OpenMP, and one baseline (python) result from 2025-12-08.
    function pickDec8Showcase(rows) {
      const dec8 = rows.filter(r => r.created_at && r.created_at.startsWith("2025-12-08"));
      const pickLatest = backend => {
        const matches = dec8
          .filter(r => r.backend === backend && r.runtime_sec && r.runtime_sec > 0)
          .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        return matches[0];
      };
      return [pickLatest("cuda"), pickLatest("openmp"), pickLatest("python")].filter(Boolean);
    }

    const runtimeChart = new Chart(chartCtx, {
      type: "bar",
      data: {
        labels: [],
        datasets: [
          {
            label: "Runtime (s)",
            data: [],
            backgroundColor: "#4f86f7"
          },
          {
            label: "Speedup vs Baseline",
            data: [],
            type: "line",
            yAxisID: "speedup",
            borderColor: "#f05a28",
            backgroundColor: "rgba(240,90,40,0.15)",
            tension: 0.3,
            spanGaps: true
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          y: {
            type: "linear",
            beginAtZero: true,
            title: { display: true, text: "Runtime (s)" }
          },
          speedup: {
            type: "logarithmic",
            position: "right",
            title: { display: true, text: "Speedup (log)" },
            grid: { drawOnChartArea: false }
          }
        },
        plugins: {
          legend: { position: "bottom" }
        }
      }
    });

    function formatNumber(value, decimals = 3) {
      if (value === null || value === undefined) return "–";
      return Number(value).toFixed(decimals);
    }

    function formatParams(params) {
      if (!params) return "–";
      const parts = [];
      if (params.P !== undefined && params.P !== null) parts.push(`P=${params.P}`);
      if (params.threads !== undefined && params.threads !== null) parts.push(`threads=${params.threads}`);
      if (params.N !== undefined && params.N !== null) parts.push(`N=${params.N}`);
      return parts.length ? parts.join(", ") : "–";
    }

    async function refreshRuns() {
      try {
        const resp = await fetch("/runs", { headers: { "HX-Request": "true" } });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const rows = await resp.json();
        if (!Array.isArray(rows)) throw new Error("Unexpected runs payload");

        const filtered = pickDec8Showcase(rows);
        filterCount.textContent = `— showing ${filtered.length} of ${rows.length} runs (Dec 8 2025: 1 CUDA, 1 OpenMP, 1 baseline)`;

        if (filtered.length === 0) {
          runsBody.innerHTML = '<tr><td colspan="8" class="text-muted">No matching Dec 8 runs found.</td></tr>';
          runtimeChart.data.labels = [];
          runtimeChart.data.datasets[0].data = [];
          runtimeChart.data.datasets[1].data = [];
          runtimeChart.update();
        } else {
          const sorted = [...filtered].sort((a, b) => b.id - a.id);
          runsBody.innerHTML = sorted.map((run, idx) => `
            <tr>
              <td>${idx + 1}</td>
              <td>${run.label}</td>
              <td>${run.backend}</td>
              <td>${formatNumber(run.runtime_sec)}</td>
              <td>${formatNumber(run.speedup_vs_baseline)}</td>
              <td>${formatNumber(run.fidelity_corr, 4)}</td>
              <td>${formatParams(run.params)}</td>
              <td>${run.notes ?? "–"}</td>
            </tr>
          `).join("");

          // Chart: only include finished runs (runtime > 0); auto-switch
          // runtime axis to log scale when values span more than ~100x so
          // millisecond-scale OpenMP bars stay visible next to ~tens-of-seconds
          // Python bars.
          const finished = sorted.filter(r => r.runtime_sec && r.runtime_sec > 0);
          const latest = finished.slice(0, 8).reverse();
          const rts = latest.map(r => r.runtime_sec);
          const ratio = rts.length ? Math.max(...rts) / Math.max(Math.min(...rts), 1e-9) : 1;
          runtimeChart.options.scales.y.type = ratio > 100 ? "logarithmic" : "linear";
          runtimeChart.options.scales.y.beginAtZero = ratio > 100 ? false : true;
          runtimeChart.options.scales.y.title.text = ratio > 100 ? "Runtime (s, log)" : "Runtime (s)";
          runtimeChart.data.labels = latest.map(run => run.label);
          runtimeChart.data.datasets[0].data = rts;
          runtimeChart.data.datasets[1].data = latest.map(run => run.speedup_vs_baseline);
          runtimeChart.update();
        }
      } catch (err) {
        runsBody.innerHTML = `<tr><td colspan="8" class="text-muted">Failed to load runs: ${err}</td></tr>`;
      }
    }

    refreshRuns();
    setInterval(refreshRuns, 2000);
  </script>
</body>
</html>
